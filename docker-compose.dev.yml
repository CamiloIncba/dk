# PostgreSQL local para desarrollo (Docker Desktop / engine con compose v2).
# Uso: docker compose -f docker-compose.dev.yml up -d
# Luego en backend: npx prisma migrate deploy && npm run prisma:seed

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kiosko_dev
    ports:
      - "5432:5432"
    volumes:
      - dk_postgres_data:/var/lib/postgresql/data

volumes:
  dk_postgres_data:
